        <meta charset="UTF-8" />

        <script type="module">
import "/js/hooktest.js"
import { Previewer } from "/js/paged.esm.js"


window.switchView = switchView;

function switchView(mode = 'default') {

    const url = new URL(window.location.href);

    if (mode === 'print') {
        url.searchParams.set('view', 'print');
    } else {
        url.searchParams.delete('view');
    }

    history.pushState({}, "", url)

    window.location.href = url.toString();

    set();
}

function set() {

    const params = new URLSearchParams(window.location.search);
    const viewMode = params.get('view');

    document.querySelector("#content").innerHTML = ""

    if (viewMode === 'print') {
        const previewer = new Previewer();
        previewer
            .preview(
                document.querySelector("#templateContent").content,
                ["/styles/preview.css"],
                document.querySelector("#content")
            )
            .then(flow => {
                console.log("preview rendered, total pages", flow.total, { flow });
            });

    } else {
        const templateContent = document.querySelector('#templatesource').innerHTML;
        const content = document.querySelector('#content');
        content.innerHTML = templateContent;
    }


};


        </script>

<hr>
<p><strong>📜 <em>Moral der Geschichte</em> 📜</strong></p>
<ul>
<li><strong>Gurken können alles</strong> (außer vielleicht <em>nicht</em> fliegen).</li>
<li><strong>Staubsauger haben Geheimnisse</strong> (und manchmal reden sie).</li>
<li><strong>Klebeband löst alle Probleme</strong> (bis es klebt).</li>
</ul>
<hr>
<p><em>„Und wenn du das liest: Karl-Heinz fliegt jetzt mit einem Drachen aus Alufolie. Sie grüßt dich.“</em> 🥒✨</p>
