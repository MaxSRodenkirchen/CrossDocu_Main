<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>

        function switchView(mode = 'default') {

            const url = new URL(window.location.href);

            if (mode === 'print') {
                url.searchParams.set('view', 'print');
            } else {
                url.searchParams.delete('view');
            }

            window.location.href = url.toString();
        }

    </script>

    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/base.css" data-pagedjs-ignore>
    <link rel="stylesheet" href="/styles/print.css" data-pagedjs-ignore>

    
  <link rel="stylesheet" href="/styles/preview.css">


    <title>How to use</title>
</head>

<body>

    <div id="mainContainer">

        <header>
    <h1>Header</h1>
</header>

        <aside id="sidebar">
            <nav id=navbar>
    <ul><li><a href="/">Index</a></li>
<li><a href="/How to use/">How to use</a></li>
<li><a href="/geschichte/">Geschichte</a></li></ul>
</nav>
        </aside>

        
        <template id="templateContent">
            <h3>Terminal-Commands</h3>
<p>Start 11ty:
npx @11ty/eleventy --serve</p>

        </template>

        <article id="content">
        </article>

        <aside id="config">
            <h3>Config</h3>
            <button onclick="switchView('web')">🌐 Webansicht</button>
<button onclick="switchView('print')">🌐 Printansicht</button>
<button onclick="switchView()">Default </button>

        </aside>

        <footer>
            <p>Footer</p>
        </footer>
    </div>


    <script>

        const params = new URLSearchParams(window.location.search);
        const viewMode = params.get('view');


        if (viewMode === 'print') {

            import("/js/paged.esm.js").then((module) => {
                const Previewer = module.Previewer;
                const previewer = new Previewer();
                previewer
                    .preview(
                        document.querySelector("#templateContent").content,
                        ["/styles/preview.css"],
                        document.querySelector("#content")
                    )
                    .then(flow => {
                        console.log("preview rendered, total pages", flow.total, { flow });
                    });
            });

        } else {
            const templateContent = document.querySelector('#templateContent').innerHTML;
            const content = document.querySelector('#content');
            content.innerHTML = templateContent;
        }

    </script>


</body>

</html>
