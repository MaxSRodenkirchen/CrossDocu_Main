        <template id="templateSource">

            <p><strong>Ziel von CrossDocu ist es, Projekt- und Prozessdokumentationen zu vereinfachen, indem Inhalte automatisch in verschiedene Formate konvertiert werden.</strong></p>
<p>Das Sammeln von Inhalten und das Gestalten von Layouts nimmt in Projekten kostbare Zeit in Anspruch. Oft werden verschiedene Formate zum Präsentieren und zur Kollaboration benötigt, weshalb Texte, Bilder und andere Medien hin und her kopiert werden müssen.</p>
<p>In CrossDocu werden Fortschritte nur noch an einer Stelle als Text, Bilder und Hyperlinks in Markdown-Dateien erfasst. Auf einer Webseite werden diese Inhalte dann in Form eines digitalen Gartens öffentlich zugänglich gemacht. Von dort aus können weitere paginierte Formate für Print und Digital erstellt werden. So können beispielsweise wöchentliche Journale als Keynotes aufbereitet oder komplette Projektdokumentationen für den Broschürendruck exportiert werden.</p>
